# Builds the CLI for every supported platform. Runs on demand
# (workflow_dispatch) and as the build stage of release.yml.
#
# Asset names must match what scripts/update.sh expects:
#   toolkit-<os>-<arch>.tar.gz  with the `toolkit` binary at the archive root.
# Linux builds are musl-static: no system dependencies, run on any distro.
name: Build binaries

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: toolkit-linux-x86_64.tar.gz
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            asset: toolkit-linux-aarch64.tar.gz
          - runner: macos-latest
            target: x86_64-apple-darwin
            asset: toolkit-macos-x86_64.tar.gz
          - runner: macos-latest
            target: aarch64-apple-darwin
            asset: toolkit-macos-aarch64.tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset: toolkit-windows-x86_64.zip
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install musl toolchain
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - run: rustup target add ${{ matrix.target }}

      # Reproducible builds: normalize embedded paths so anyone can rebuild
      # and compare hashes (see docs/architecture.md "Reproducing a release").
      - name: Set reproducible build flags
        shell: bash
        run: echo "RUSTFLAGS=--remap-path-prefix=$PWD=/build --remap-path-prefix=$HOME=/remapped-home" >> "$GITHUB_ENV"

      - run: cargo build --release --locked --target ${{ matrix.target }} -p toolkit-cli

      - name: Package (tar.gz)
        if: ${{ !contains(matrix.asset, '.zip') }}
        run: |
          set -euo pipefail
          cp "target/${{ matrix.target }}/release/toolkit" toolkit
          # Deterministic archive: fixed mtime/owner/order, gzip without
          # timestamp — so the tarball hash is reproducible, not just the
          # binary inside it. The flags are GNU-tar-only; macOS ships BSD
          # tar as `tar` and GNU tar as `gtar` (this once silently
          # produced empty macOS archives: BSD tar rejected the flags and
          # without pipefail gzip compressed an empty stream).
          TAR="$(command -v gtar || command -v tar)"
          "$TAR" --sort=name --owner=0 --group=0 --numeric-owner \
              --mtime='UTC 2020-01-01' -cf - toolkit | gzip -n > "${{ matrix.asset }}"

      - name: Sanity-check the archive
        if: ${{ !contains(matrix.asset, '.zip') }}
        run: |
          set -euo pipefail
          tar -tzf "${{ matrix.asset }}" | grep -qx toolkit
          size=$(wc -c < "${{ matrix.asset }}")
          test "$size" -gt 1000000 || { echo "archive suspiciously small: $size bytes"; exit 1; }

      - name: Package (zip)
        if: contains(matrix.asset, '.zip')
        shell: pwsh
        run: Compress-Archive -Path "target/${{ matrix.target }}/release/toolkit.exe" -DestinationPath "${{ matrix.asset }}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error
