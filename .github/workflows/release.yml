# Releases binaries: push a tag like v0.1.0 and this builds every platform,
# generates SHA256SUMS, and publishes a GitHub Release — the artifacts and
# checksums that scripts/update.sh verifies and installs.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd assets
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
          # Tripwire: no two assets may hash identically — that's how an
          # empty-archive bug once shipped for three releases running.
          test "$(cut -d' ' -f1 SHA256SUMS | sort | uniq -d | wc -l)" -eq 0 \
            || { echo "duplicate asset hashes — something produced identical files"; exit 1; }

      # Cryptographic provenance: proves each artifact was built by THIS
      # repository's workflow at this commit (verify with `gh attestation
      # verify <file> --repo koundinyagoparaju/toolkit`).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: assets/*

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            assets/*

      # Keep the Homebrew formula and Scoop manifest pointing at this
      # release (they live in-repo: Formula/ is a brew tap, bucket/ a
      # scoop bucket). Fully regenerated from the published checksums.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: repo
          ref: main
      - name: Update Homebrew formula and Scoop manifest
        run: |
          python3 repo/scripts/update-packaging.py "$GITHUB_REF_NAME" assets/SHA256SUMS repo
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula bucket
          git commit -m "Packaging: point brew/scoop at $GITHUB_REF_NAME"
          git pull --rebase && git push
