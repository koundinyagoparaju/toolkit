# Releases binaries: push a tag like v0.1.0 and this builds every platform,
# generates SHA256SUMS, and publishes a GitHub Release — the artifacts and
# checksums that scripts/update.sh verifies and installs.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd assets
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      # Cryptographic provenance: proves each artifact was built by THIS
      # repository's workflow at this commit (verify with `gh attestation
      # verify <file> --repo koundinyagoparaju/toolkit`).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: assets/*

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            assets/*
