# Tests every PR (and pushes to main).
#
# Supply-chain stance: only GitHub-owned actions (actions/*) are used, and
# nothing here can affect what ships — releases are built by release.yml
# from a tag. Pin actions to commit SHAs for even stricter guarantees.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    name: Test, lint, format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      # Tool packs are pure functions: no I/O, no ambient state, no unsafe.
      # crates/packs/clippy.toml bans the I/O APIs (via CLIPPY_CONF_DIR,
      # since clippy resolves one config per run); #![deny(unsafe_code)]
      # in each pack bans author unsafe. This makes accidental impurity a
      # build failure and deliberate impurity conspicuous in review.
      - name: Tool purity (no I/O in packs)
        env:
          CLIPPY_CONF_DIR: ${{ github.workspace }}/crates/packs
        run: cargo clippy --locked -p toolkit-pack-text -p toolkit-pack-image
             -p toolkit-pack-crypto -p toolkit-pack-data -- -D warnings
      - run: cargo test --workspace --locked

  web:
    name: Wasm packs + web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - run: rustup target add wasm32-unknown-unknown
      - run: ./scripts/build-web-assets.sh
      - run: npm ci
        working-directory: web
      # The same managed Chromium the pre-push hook and local runs use,
      # instead of whatever Chrome the runner image happens to carry.
      # Cached (~115MB) keyed on the pinned playwright version; the
      # install step is a no-op on a warm cache.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
      - run: npx --no-install playwright install --with-deps chromium
        working-directory: web
      - run: npm run build
        working-directory: web
      - name: ABI protocol tests (wasm via Node)
        run: node tests/abi.test.mjs
      - name: Browser end-to-end tests (playwright, chromium)
        run: npx --no-install playwright test
        working-directory: web

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo
          key: audit-${{ runner.os }}-cargo-audit
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  vet:
    name: Supply-chain vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo
          key: vet-${{ runner.os }}-cargo-vet
      - run: command -v cargo-vet || cargo install cargo-vet --locked
      # --locked uses the committed imports.lock: deterministic, no network.
      # A new dependency fails here until it's audited or consciously
      # exempted in supply-chain/config.toml.
      - run: cargo vet --locked

  repro:
    name: Reproducible build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build twice in different directories, compare hashes
        run: |
          cp -r "$PWD" /tmp/build-a
          cp -r "$PWD" /tmp/build-b
          for d in /tmp/build-a /tmp/build-b; do
            cd "$d"
            export RUSTFLAGS="--remap-path-prefix=$PWD=/build --remap-path-prefix=$HOME=/remapped-home"
            cargo build --release --locked -p toolkit-cli
            cargo build --release --locked --target wasm32-unknown-unknown -p toolkit-pack-text
          done
          a_cli=$(sha256sum /tmp/build-a/target/release/toolkit | cut -d' ' -f1)
          b_cli=$(sha256sum /tmp/build-b/target/release/toolkit | cut -d' ' -f1)
          a_wasm=$(sha256sum /tmp/build-a/target/wasm32-unknown-unknown/release/toolkit_pack_text.wasm | cut -d' ' -f1)
          b_wasm=$(sha256sum /tmp/build-b/target/wasm32-unknown-unknown/release/toolkit_pack_text.wasm | cut -d' ' -f1)
          echo "cli:  $a_cli / $b_cli"
          echo "wasm: $a_wasm / $b_wasm"
          test "$a_cli" = "$b_cli" && test "$a_wasm" = "$b_wasm"
