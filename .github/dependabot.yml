# Keeps dependencies fresh so security advisories are caught early.
# Two ecosystems matter here:
#   - cargo: the pure-Rust deps that tool logic is built on
#   - github-actions: the workflow actions, which we pin to commit SHAs;
#     Dependabot bumps the pin and updates the trailing "# vX" comment.
# The web app's npm deps (svelte, vite, playwright) are exact-pinned,
# never shipped to users, and checked monthly as one grouped PR — an
# unwatched pin ages silently, security patches included, but weekly
# churn near the trust boundary isn't wanted either.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      web-deps:
        patterns: ["*"]
