# Keeps dependencies fresh so security advisories are caught early.
# Two ecosystems matter here:
#   - cargo: the pure-Rust deps that tool logic is built on
#   - github-actions: the workflow actions, which we pin to commit SHAs;
#     Dependabot bumps the pin and updates the trailing "# vX" comment.
# The web app's npm deps are intentionally NOT tracked: nothing there
# touches tool logic, and we don't want npm churn near the trust boundary.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
